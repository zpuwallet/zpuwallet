name: Build and Release

on:
  workflow_dispatch:
  pull_request:
    branches:
    - main
  push:
    tags:
      - zkool-v*

jobs:
  build:
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: android
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            target: linux
            arch: aarch64
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: windows
    env:
      FLUTTER_VERSION: 3.41.7
      RUSTFLAGS: '--cfg zcash_unstable="nu7"'

    steps:
      - name: Install RUST
        uses: dtolnay/rust-toolchain@stable
      - name: Install PYTHON
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Flutter
        shell: bash
        run: |
          git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git $RUNNER_TEMP/flutter
          echo "$RUNNER_TEMP/flutter/bin" >> $GITHUB_PATH
      - run: |
          flutter --version
          flutter precache
        shell: bash
      - name: Get version number
        id: version
        shell: bash
        run: |
          SEMVER=$(sed -n 's/^version: *\([^ ]*\).*/\1/p' pubspec.yaml)
          BUILD=$(cat build_number.txt)
          RELEASE_VERSION="${SEMVER}+${BUILD}"
          sed -i.bak "s/^version: .*/version: ${RELEASE_VERSION}/" pubspec.yaml && rm -f pubspec.yaml.bak
          echo "result=$RELEASE_VERSION" >> $GITHUB_OUTPUT
      - name: Build Android
        id: build_android
        if: ${{ matrix.target == 'android' && github.event_name != 'pull_request' }}
        uses: ./.github/actions/android
        with:
          version: ${{ steps.version.outputs.result }}
          jks: ${{ secrets.JKS_PASSWORD }}
      - name: Build Linux
        id: build_linux
        if: ${{ matrix.target == 'linux' }}
        uses: ./.github/actions/linux
        with:
          version: ${{ steps.version.outputs.result }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
      - name: Build Mac
        id: build_mac
        if: ${{ matrix.target == 'mac' && github.event_name != 'pull_request' }}
        uses: ./.github/actions/mac
        with:
          version: ${{ steps.version.outputs.result }}
          jks: ${{ secrets.JKS_PASSWORD }}
          ios_pwd: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          mac_pwd: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          apple_cert_name: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          apple_id: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          apple_pwd: ${{ secrets.MACOS_NOTARIZATION_PWD }}
          apple_team_id: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
      - name: Build Windows
        id: build_windows
        if: ${{ matrix.target == 'windows' && github.event_name != 'pull_request' }}
        uses: ./.github/actions/windows
        with:
          version: ${{ steps.version.outputs.result }}
      - name: Collect output dir
        id: collect
        shell: bash
        run: |
          df -h
          echo "outdir=${{ steps.build_android.outputs.outdir || steps.build_linux.outputs.outdir || steps.build_mac.outputs.outdir || steps.build_windows.outputs.outdir }}" >> $GITHUB_OUTPUT
      - name: Upload build artifacts
        if: startsWith(github.ref_name, 'zkool-v')
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}-${{ matrix.arch }}
          path: ${{ steps.collect.outputs.outdir }}/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref_name, 'zkool-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write       # edit release / upload assets
      id-token: write       # sigstore OIDC for attestation
      attestations: write   # write attestation to GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Compute version
        id: version
        shell: bash
        run: |
          NAME=$(sed -n 's/^name: *\([^ ]*\).*/\1/p' pubspec.yaml)
          SEMVER=$(sed -n 's/^version: *\([^ ]*\).*/\1/p' pubspec.yaml)
          BUILD=$(cat build_number.txt)
          echo "distname=${NAME}-${SEMVER}+${BUILD}" >> $GITHUB_OUTPUT
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%P\0' | sort -z | xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-checksums: dist/SHA256SUMS
      - name: Stage attestation bundle
        shell: bash
        run: cp "${{ steps.attest.outputs.bundle-path }}" "dist/${{ steps.version.outputs.distname }}.intoto.jsonl"
      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Append attestation notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          DISTNAME: ${{ steps.version.outputs.distname }}
        run: |
          CHECKSUMS=$(cat dist/SHA256SUMS)
          BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
          gh release edit "$TAG" --repo "$REPO" --notes "$(cat <<EOF
          $BODY

          ### Attestations

          Each released binary carries a signed GitHub build-provenance
          attestation. To verify a file you downloaded:

          \`\`\`sh
          # Verify against the attestations stored on GitHub (needs network):
          gh attestation verify <file> --repo $REPO

          # Or verify fully offline using the bundle attached to this release:
          gh attestation verify <file> --bundle $DISTNAME.intoto.jsonl
          \`\`\`

          \`SHA256SUMS\` lists the digest of every artifact; check a downloaded
          file against it to confirm integrity.

          ### Checksums

          \`\`\`
          $CHECKSUMS
          \`\`\`
          EOF
          )"

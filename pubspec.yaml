name: zkool
description: "Zkool"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 6.18.1+229

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.5.3
  convert: ^3.1.1
  cupertino_icons: ^1.0.8
  rlz:
    path: rust_builder
  flutter_rust_bridge: 2.12.0

  logger: ^2.0.2+1
  go_router: ^14.8.1
  flutter_riverpod: ^3.0.3
  riverpod_annotation: any
  rive: ^0.13.20
  hooks_riverpod: ^3.0.3
  gap: ^3.0.1
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.1.2
  freezed_annotation: any

  path_provider: ^2.1.5
  file_picker: ^10.3.8

  collection: ^1.19.1
  image_picker: ^1.1.2
  awesome_dialog: ^3.2.1
  animated_reorderable_list: ^1.2.0
  toastification: ^3.0.2

  showcaseview: ^4.0.1
  flutter_svg: ^2.0.10+1

  fixed: ^5.3.3
  decimal: ^3.2.1
  intl: ^0.20.2

  mobile_scanner: ^7.0.1
  qr_flutter: ^4.1.0

  local_auth: ^2.3.0
  flutter_native_splash: ^2.4.6
  package_info_plus: ^8.3.0
  easy_stepper: ^0.8.5+1
  easy_debounce: ^2.0.3
  searchable_listview: ^2.17.3
  data_table_2: ^2.6.0
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.2

  bubble: ^1.2.1
  memoize: ^3.0.0
  async: ^2.13.0
  flutter_passkey_service:
    git: https://github.com/hhanh00/flutter_passkey_service.git

  googleapis: ^13.0.0
  google_sign_in: ^6.0.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.0
  device_info_plus: ^10.1.0

  password_strength_checker: ^1.3.2
  crypto: ^3.0.3
  flex_color_scheme: ^8.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.1.2
  freezed: ^3.2.3
  riverpod_generator: ^3.0.3
  flutter_launcher_icons: ^0.14.3

# Local development override — points flutter_passkey_service at the sibling
# checkout so edits there take effect without pushing and bumping the git ref.
# Remove (or comment out) before committing / publishing.
# dependency_overrides:
#   flutter_passkey_service:
#     path: ../flutter_passkey_service

flutter:
  uses-material-design: true

  assets:
    - misc/icon.png
    - assets/tor.svg
    - assets/zcash.svg
